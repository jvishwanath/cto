# cto infra-only compose — bundled inside the `cto` binary (Phase 10).
#
# Brings up the three backend services the CTO app needs:
#   - qdrant   (vector store, ports 6333 + 6334)
#   - postgres (checkpointer + store + code graph, port 5432)
#   - phoenix  (OTel tracing UI, port 6006 + OTLP gRPC 4317)
#
# The `app` service from the developer compose file is INTENTIONALLY
# absent — it requires the source tree to build. Local-mode binary
# users who want the full app run `pip install -e .` separately
# from the repo, then `cto chat` connects to localhost:8000 (or to
# qdrant/postgres directly via the in-process graph).
#
# Volume paths come from the env var CTO_DATA_DIR (set by the binary
# before invoking docker compose). Project name pinned to `cto` —
# per-user namespacing is deferred per phase-10 scope.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cto-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ${CTO_DATA_DIR:-./cto-data}/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  postgres:
    image: pgvector/pgvector:pg16
    container_name: cto-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    volumes:
      - ${CTO_DATA_DIR:-./cto-data}/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 3s
      retries: 12

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: cto-phoenix
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
    volumes:
      - ${CTO_DATA_DIR:-./cto-data}/phoenix:/mnt/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6006/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
